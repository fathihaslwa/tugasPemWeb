<!DOCTYPE html>
<html>
<head>
    <title>Form Identitas Mahasiswa</title>
    <style>
        body {
            background-color: #ccc;
            font-family: Arial, sans-serif;
        }

        .container {
            width: 500px;
            margin: 30px auto;
            background-color: yellow;
            border: 2px solid black;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        td, th {
            border: 1px solid black;
            padding: 8px;
        }

        .header {
            text-align: center;
            font-weight: bold;
            font-size: 20px;
        }

        .subheader {
            text-align: center;
            font-size: 12px;
        }

        .logo {
            width: 100px;
        }

        input, select {
            width: 95%;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #999;
        }

        .btn {
            background-color: #4CAF50;
            color: white;
            padding: 10px;
            border: none;
            width: 100px;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #45a049;
        }

        .back {
            margin-left: 20px;
        }
    </style>
</head>
<body>

<a href="index.html" class="back">Kembali ke layout</a>

<div class="container">
    <table>
        <tr>
            <td class="logo">
                <img src="Ubhara.png" width="100">
            </td>
            <td colspan="2">
                <div class="header">FORM IDENTITAS MAHASISWA</div>
                <div class="subheader">SILAHKAN ISI LENGKAP DATA DIRI ANDA !!</div>
            </td>
        </tr>

        <tr>
            <th>Label</th>
            <th>Input</th>
        </tr>

        <tr>
            <td>Nama</td>
            <td><input type="text"></td>
        </tr>

        <tr>
            <td>Email</td>
            <td><input type="email"></td>
        </tr>

        <tr>
            <td>Jenis Kelamin</td>
            <td>
                <select>
                    <option>Pilih</option>
                    <option>Laki-laki</option>
                    <option>Perempuan</option>
                </select>
            </td>
        </tr>

        <tr>
            <td>Alamat</td>
            <td><input type="text"></td>
        </tr>

        <tr>
            <td>Kota</td>
            <td><input type="text"></td>
        </tr>

        <tr>
            <td>Kode Pos</td>
            <td><input type="text"></td>
        </tr>

        <tr>
            <td>Upload File</td>
            <td><input type="file"></td>
        </tr>

        <tr>
            <td colspan="2">
                <button class="btn">Submit</button>
            </td>
        </tr>
    </table>
</div>

</body>
</html>
